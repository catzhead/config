# SOPS configuration for this repo.
#
# Recipient is the operator's age master key. The matching private key
# lives in ~/.config/sops/age/keys.txt (mode 0600) and, durably, in the
# operator's personal 1Password vault as Secure Note "age master key — sops".
#
# To edit: SOPS_AGE_KEY_FILE=~/.config/sops/age/keys.txt sops secrets/secrets.enc.yaml
# To decrypt: SOPS_AGE_KEY_FILE=~/.config/sops/age/keys.txt sops -d secrets/secrets.enc.yaml

creation_rules:
  - path_regex: ^secrets/.*\.enc\.ya?ml$
    age: age1jf43h525yt7dwd04a2m0y8gl3sms83nxeu0ky38mkwj6w6rasuhqrud4fr
